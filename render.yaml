services:
  - type: web
    name: sns-memoria-digital
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      cd frontend && npm ci && npm run build
    startCommand: gunicorn src.web:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 90
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.2"
      - key: NODE_VERSION
        value: "20"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: GROQ_API_KEY
        sync: false
